server:
    port: 8080

spring:
    application:
        name: api-gateway
    config:
        import: "optional:configserver:http://localhost:8888"
    cloud:
        gateway:

            globalcors:
                cors-configurations:
                    '[/**]':
                        allowedOrigins: "http://localhost:5173"
                        allowedMethods:
                        - GET
                        - POST
                        - PUT
                        - DELETE
                        - OPTIONS
                        allowedHeaders: "*"
                        allowCredentials: true

            routes:
                - id: user-service
                  uri: lb://USER-SERVICE
                  predicates:
                    - Path=/users/**
                
                - id: catalog-service
                  uri: lb://CATALOG-SERVICE
                  predicates:
                    - Path=/books/**

                - id: media-service
                  uri: lb://MEDIA-SERVICE
                  predicates:
                    - Path=/media/**

